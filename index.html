<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Saga Solitaire" />
  <meta name="description" content="JdR Solo IA en français — Créez votre aventurier et partez à l'aventure avec un MJ IA." />
  <title>⚔️ Saga Solitaire</title>

  <!-- PWA Manifest inline via JS blob — fonctionne sans serveur -->
  <link id="pwa-manifest" rel="manifest" />

  <!-- Icône Apple -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text y='.9em' font-size='80' x='10'>⚔️</text></svg>" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Georgia', serif; }
    body { background: #0a0a0f; color: #d0d0f0; -webkit-tap-highlight-color: transparent; }
    #app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 2px; }

    /* Animations */
    @keyframes pulse { 0%,100% { opacity:.3; transform:scale(.8); } 50% { opacity:1; transform:scale(1.2); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glow { 0%,100% { text-shadow: 0 0 20px #7070ff60; } 50% { text-shadow: 0 0 40px #7070ffaa; } }
    @keyframes deSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.3); } 100% { transform: rotate(360deg) scale(1); } }

    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Boutons */
    .btn {
      border-radius: 8px; cursor: pointer; font-family: 'Georgia', serif;
      transition: all 0.15s; border: 1px solid; display: inline-flex;
      align-items: center; justify-content: center; gap: 0.4rem;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Écrans */
    .screen { flex: 1; overflow-y: auto; padding: 1.2rem; display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* Chat */
    #chat-messages { flex: 1; overflow-y: auto; padding: 0.8rem; display: flex; flex-direction: column; gap: 0.7rem; }
    .msg-mj { align-self: flex-start; max-width: 88%; animation: fadeIn 0.3s ease; }
    .msg-joueur { align-self: flex-end; max-width: 88%; animation: fadeIn 0.3s ease; }
    .msg-systeme { align-self: center; max-width: 90%; animation: fadeIn 0.2s ease; }
    .msg-bubble { padding: 0.75rem 0.9rem; border-radius: 12px; border: 1px solid; line-height: 1.65; font-size: 0.92rem; white-space: pre-wrap; word-break: break-word; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .modal-box { border-radius: 16px; border: 1px solid; padding: 1.2rem; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; }

    /* Dé animé */
    .de-spin { animation: deSpin 0.6s ease; }

    /* Grid races/classes */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
    .stat-card { border-radius: 8px; padding: 0.5rem; text-align: center; border: 1px solid; }

    /* Barre de progression */
    .progress-bar-track { height: 4px; border-radius: 2px; overflow: hidden; flex: 1; }
    .progress-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* PV bar */
    .pv-track { height: 10px; border-radius: 5px; overflow: hidden; }
    .pv-fill { height: 100%; transition: width 0.3s; }

    /* Typing dots */
    .typing { display: flex; gap: 4px; padding: 0.8rem; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 1s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    /* Input zone */
    #game-input-zone { flex-shrink: 0; padding: 0.6rem; border-top: 1px solid; }
    #game-input-zone .actions { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    #game-input-zone .input-row { display: flex; gap: 0.4rem; }
    #saisie { flex: 1; border-radius: 8px; padding: 0.6rem 0.8rem; font-family: 'Georgia', serif; font-size: 0.92rem; outline: none; border: 1px solid; resize: none; height: 42px; line-height: 1.4; }

    /* Install banner */
    #install-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300; padding: 1rem; text-align: center; font-size: 0.85rem; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════════════════════════ -->
  <!-- ÉCRAN ACCUEIL                          -->
  <!-- ══════════════════════════════════════ -->
  <div id="screen-accueil" class="screen active" style="align-items:center;justify-content:center;text-align:center;">
    <div style="margin-bottom:2.5rem;">
      <div id="logo-emoji" style="font-size:4.5rem;margin-bottom:0.5rem;">⚔️</div>
      <h1 id="logo-title" style="font-size:2.4rem;letter-spacing:0.06em;animation:glow 3s infinite;">SAGA SOLITAIRE</h1>
      <p style="margin-top:0.4rem;font-size:1rem;letter-spacing:0.12em;opacity:0.7;">JEU DE RÔLE SOLO · MAÎTRE IA</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:1rem;width:100%;max-width:320px;">
      <button class="btn" id="btn-nouveau" style="font-size:1.05rem;padding:0.85rem 1.5rem;" onclick="showCreation()">✨ Nouveau Personnage</button>
      <button class="btn" id="btn-continuer" style="font-size:1.05rem;padding:0.85rem 1.5rem;display:none;" onclick="showListe()">📜 Continuer</button>
    </div>
    <p style="margin-top:3rem;font-size:0.75rem;opacity:0.4;">Propulsé par Claude IA · Entièrement en français</p>
    <button id="btn-install" class="btn" style="margin-top:1rem;font-size:0.8rem;padding:0.4rem 0.8rem;display:none;" onclick="installPWA()">📲 Installer sur cet appareil</button>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- ÉCRAN LISTE PERSONNAGES               -->
  <!-- ══════════════════════════════════════ -->
  <div id="screen-liste" class="screen" style="padding-top:1rem;">
    <button class="btn" style="align-self:flex-start;margin-bottom:1rem;padding:0.3rem 0.7rem;font-size:0.85rem;" onclick="showAccueil()">← Retour</button>
    <h2 style="margin-bottom:1rem;">Mes Aventuriers</h2>
    <div id="liste-persos" style="display:flex;flex-direction:column;gap:0.8rem;"></div>
    <button class="btn" id="btn-nouveau-liste" style="margin-top:1.2rem;padding:0.7rem;font-size:0.95rem;width:100%;" onclick="showCreation()">✨ Nouveau Personnage</button>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- ÉCRAN CRÉATION                        -->
  <!-- ══════════════════════════════════════ -->
  <div id="screen-creation" class="screen" style="max-width:600px;margin:0 auto;width:100%;">
    <!-- Barre de progression -->
    <div style="display:flex;align-items:center;gap:0.3rem;margin-bottom:1.5rem;flex-shrink:0;">
      <button class="btn" style="font-size:0.8rem;padding:0.3rem 0.5rem;flex-shrink:0;" onclick="etapePrecedente()">←</button>
      <div id="progress-steps" style="display:flex;gap:4px;flex:1;"></div>
    </div>
    <div id="creation-content" style="flex:1;overflow-y:auto;"></div>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- ÉCRAN JEU                             -->
  <!-- ══════════════════════════════════════ -->
  <div id="screen-jeu" style="display:none;flex-direction:column;height:100vh;height:100dvh;">
    <!-- Header -->
    <div id="game-header" style="display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0.7rem;border-bottom:1px solid;flex-shrink:0;">
      <button class="btn" style="font-size:1rem;padding:0.3rem 0.5rem;" onclick="retourListe()">←</button>
      <div style="flex:1;min-width:0;">
        <div id="header-nom" style="font-weight:bold;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div id="header-sub" style="font-size:0.72rem;opacity:0.6;"></div>
      </div>
      <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:0.2rem;border:1px solid;border-radius:6px;padding:0.2rem 0.4rem;">
          <button style="background:none;border:none;color:#f44336;cursor:pointer;font-size:0.95rem;padding:0 2px;touch-action:manipulation;" onclick="modifyPV(-1)">−</button>
          <span id="header-pv" style="font-size:0.78rem;min-width:50px;text-align:center;"></span>
          <button style="background:none;border:none;color:#4caf50;cursor:pointer;font-size:0.95rem;padding:0 2px;touch-action:manipulation;" onclick="modifyPV(1)">+</button>
        </div>
        <button class="btn" style="font-size:0.72rem;padding:0.25rem 0.5rem;" onclick="openFiche()">📋</button>
      </div>
    </div>
    <!-- Messages -->
    <div id="chat-messages"></div>
    <!-- Zone saisie -->
    <div id="game-input-zone">
      <div class="actions">
        <button class="btn" id="btn-de" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="lancerDeLibre()">🎲 d20</button>
        <button class="btn" id="btn-combat" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="demanderCombat()">⚔️ Combat</button>
        <button class="btn" id="btn-repos" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="actionRapide('repos')">💤 Repos</button>
        <button class="btn" id="btn-explorer" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="actionRapide('explorer')">🔍 Explorer</button>
        <button class="btn" id="btn-parler" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="actionRapide('parler')">💬 Parler</button>
        <button class="btn" id="btn-quetes" style="font-size:0.75rem;padding:0.25rem 0.5rem;" onclick="openQuetes()">📜 Quêtes</button>
      </div>
      <div class="input-row">
        <textarea id="saisie" placeholder="Décrivez votre action..." onkeydown="handleKey(event)"></textarea>
        <button class="btn" id="btn-envoyer" style="font-size:1.1rem;padding:0.4rem 0.7rem;flex-shrink:0;" onclick="envoyerSaisie()">➤</button>
      </div>
    </div>
  </div>

</div>

<!-- MODAL FICHE PERSONNAGE -->
<div id="modal-fiche" class="modal-overlay" style="display:none;" onclick="closeFiche(event)">
  <div id="fiche-content" class="modal-box"></div>
</div>

<!-- MODAL QUÊTES -->
<div id="modal-quetes" class="modal-overlay" style="display:none;" onclick="closeQuetes(event)">
  <div id="quetes-content" class="modal-box"></div>
</div>

<script>
// ══════════════════════════════════════════════
// PWA SETUP
// ══════════════════════════════════════════════
const MANIFEST = {
  name: "Saga Solitaire",
  short_name: "Saga",
  description: "JdR Solo IA en français",
  start_url: ".",
  display: "standalone",
  background_color: "#0a0a0f",
  theme_color: "#0a0a0f",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230a0a0f'/><text y='.9em' font-size='75' x='12'>⚔️</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230a0a0f'/><text y='.9em' font-size='75' x='12'>⚔️</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(MANIFEST)], {type:'application/json'});
document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

// Service Worker inline
const SW_CODE = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => clients.claim());
self.addEventListener('fetch', e => {
  if(e.request.url.includes('googleapis.com')) return;
  e.respondWith(caches.open('saga-v1').then(c => c.match(e.request).then(r => r || fetch(e.request))));
});
`;
if('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

// Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btn-install').style.display = 'inline-flex';
});
function installPWA() {
  if(deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById('btn-install').style.display='none'; }); }
}

// ══════════════════════════════════════════════
// DONNÉES
// ══════════════════════════════════════════════
const UNIVERS = [
  { id:"medieval",  label:"⚔️ Médiéval Fantastique",  emoji:"⚔️",  desc:"Magie, dragons, royaumes en guerre et donjons oubliés." },
  { id:"futuriste", label:"🚀 Futuriste / Cyberpunk",  emoji:"🚀",  desc:"Corporations, IA rebelles, implants cybernétiques et colonies spatiales." },
  { id:"horreur",   label:"🕯️ Horreur Gothique",       emoji:"🕯️",  desc:"Créatures de la nuit, asiles maudits, rituels occultes et terreur indicible." },
  { id:"western",   label:"🤠 Western Fantastique",    emoji:"🤠",  desc:"Grand Ouest mystérieux, esprits amérindiens, mort-vivants et hors-la-loi." },
  { id:"postapoc",  label:"☢️ Post-Apocalyptique",     emoji:"☢️",  desc:"Wasteland, survivants, mutants et factions qui se battent pour les dernières ressources." },
  { id:"pirate",    label:"🏴‍☠️ Pirates & Mers Mystiques",emoji:"🏴‍☠️", desc:"Océans enchantés, kraken, îles maudites et trésors oubliés des dieux." },
];

const RACES = {
  medieval:  ["Humain","Elfe","Nain","Semi-Orc","Halfelin","Gnome","Tieffelin","Drakéide"],
  futuriste: ["Humain","Humain Augmenté","Androïde","Alien Xérien","Clone","IA Incarnée","Mutant","Humain Spatial"],
  horreur:   ["Humain","Demi-Vampire","Loup-Garou Latent","Médium","Descendant de Sorcière","Revenant","Nephilim","Humain Maudit"],
  western:   ["Humain","Revenant","Esprit Incarné","Natif Mystique","Demi-Démon","Chasseur de Primes Maudit","Automate","Pistolero Fantôme"],
  postapoc:  ["Humain","Mutant","Synthétique","Enfant des Cendres","Cyborg","Ghoul Conscient","Nomade Irradié","Super-Mutant"],
  pirate:    ["Humain","Elfe des Mers","Sirène Métamorphe","Mort-Vivant Marin","Nain des Profondeurs","Homme-Crabe","Esprit des Tempêtes","Tieffelin Marin"],
};

const CLASSES = {
  medieval:  ["Guerrier","Mage","Voleur","Clerc","Rôdeur","Paladin","Druide","Barde"],
  futuriste: ["Soldat","Hacker","Ingénieur","Médic","Espion","Pilote","Mercenaire","Psionique"],
  horreur:   ["Chasseur","Occultiste","Médecin","Détective","Exorciste","Nécromancien","Gardien","Fantôme Joueur"],
  western:   ["Pistolero","Shaman","Chasseur de Primes","Marchand","Docteur de Campagne","Hors-la-loi","Éclaireur","Prédicateur"],
  postapoc:  ["Pillard","Technicien","Éclaireur","Médic de Fortune","Chef de Clan","Guerrier Mutant","Bricoleur","Sniper"],
  pirate:    ["Corsaire","Capitaine","Canonnier","Navigateur","Mage des Mers","Cuisinier Mystique","Lame Dansante","Vaudouisant"],
};

const COMPETENCES = {
  medieval:  ["Épée à deux mains","Archerie","Magie du feu","Soins","Discrétion","Persuasion","Survie","Crochetage","Connaissance des créatures","Alchimie"],
  futuriste: ["Combat rapproché","Piratage","Réparation","Médecine","Tir de précision","Pilotage","Cryptographie","Ingénierie","Manipulation","Survie"],
  horreur:   ["Tir","Combat à mains nues","Rituel occulte","Médecine","Discrétion","Enquête","Résistance mentale","Exorcisme","Perception","Premiers secours"],
  western:   ["Dégainement rapide","Équitation","Survie désertique","Poker","Intimidation","Premiers secours","Pistage","Explosifs","Lasso","Connaissance des esprits"],
  postapoc:  ["Combat brutal","Récupération","Mécanique","Médecine de terrain","Survie","Négociation","Tir","Piégeage","Radiation","Leadership"],
  pirate:    ["Escrime","Navigation","Canonnade","Nœuds marins","Plongée","Commerce","Intimidation","Connaissance des mers mystiques","Combat naval","Vaudou"],
};

const STATS_LABELS = ["Force","Dextérité","Constitution","Intelligence","Sagesse","Charisme"];

const PALETTES = {
  medieval:  { bg:"#0d0a07", card:"#1a1208", border:"#7c5c1e", accent:"#d4a017", text:"#e8d5a3", sub:"#a08050" },
  futuriste: { bg:"#060d14", card:"#0d1a24", border:"#0050aa", accent:"#00d4ff", text:"#c0e8ff", sub:"#6090a0" },
  horreur:   { bg:"#080506", card:"#110a0e", border:"#6b1020", accent:"#cc2040", text:"#d8b0b8", sub:"#805060" },
  western:   { bg:"#0e0a06", card:"#1a1208", border:"#8b5e1a", accent:"#e8a040", text:"#e8d0a0", sub:"#a07040" },
  postapoc:  { bg:"#080a06", card:"#101408", border:"#607020", accent:"#a0cc20", text:"#c8d890", sub:"#708040" },
  pirate:    { bg:"#060c10", card:"#0c1820", border:"#1a6080", accent:"#20a0c0", text:"#a0d8e8", sub:"#507080" },
  default:   { bg:"#0a0a0f", card:"#14141e", border:"#3a3a5c", accent:"#7070ff", text:"#d0d0f0", sub:"#7070a0" },
};
function pal(id) { return PALETTES[id] || PALETTES.default; }

// ══════════════════════════════════════════════
// ÉTAT GLOBAL
// ══════════════════════════════════════════════
let STATE = {
  persos: [],
  persoActif: null,
  apiMessages: [],
  chargement: false,
  // Création
  etape: 0,
  choixUnivers: null, choixRace: null, choixClasse: null,
  choixNom: "", choixStats: null, choixComps: [],
};

function loadPersos() {
  try { STATE.persos = JSON.parse(localStorage.getItem('saga_persos') || '[]'); } catch { STATE.persos = []; }
}
function savePersos() {
  localStorage.setItem('saga_persos', JSON.stringify(STATE.persos));
}
function savePerso(persoMaj) {
  const idx = STATE.persos.findIndex(p => p.dateCreation === persoMaj.dateCreation);
  if(idx >= 0) STATE.persos[idx] = persoMaj;
  else STATE.persos.push(persoMaj);
  STATE.persoActif = persoMaj;
  savePersos();
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-jeu').style.display = 'none';
  const sc = document.getElementById('screen-' + id);
  if(sc) sc.classList.add('active');
}
function showAccueil() {
  loadPersos();
  applyTheme(PALETTES.default);
  const btnC = document.getElementById('btn-continuer');
  btnC.style.display = STATE.persos.length > 0 ? 'inline-flex' : 'none';
  btnC.textContent = `📜 Continuer (${STATE.persos.length} perso${STATE.persos.length > 1 ? 's' : ''})`;
  applyAccueilTheme();
  showScreen('accueil');
}
function showListe() {
  applyTheme(PALETTES.default);
  renderListe();
  showScreen('liste');
}
function showCreation() {
  STATE.etape = 0; STATE.choixUnivers = null; STATE.choixRace = null;
  STATE.choixClasse = null; STATE.choixNom = ""; STATE.choixStats = null; STATE.choixComps = [];
  applyTheme(PALETTES.default);
  renderEtape();
  showScreen('creation');
}
function retourListe() {
  showListe();
}

function applyAccueilTheme() {
  const p = PALETTES.default;
  document.getElementById('logo-title').style.color = p.accent;
  document.getElementById('btn-nouveau').style.cssText += `background:${p.accent}25;border-color:${p.accent};color:${p.accent};`;
  document.getElementById('btn-continuer').style.cssText += `background:${p.border}25;border-color:${p.border};color:${p.sub};`;
}

function applyTheme(p) {
  document.body.style.background = p.bg;
  document.body.style.color = p.text;
}

// ══════════════════════════════════════════════
// LISTE PERSONNAGES
// ══════════════════════════════════════════════
function renderListe() {
  const container = document.getElementById('liste-persos');
  const p = PALETTES.default;
  const btnN = document.getElementById('btn-nouveau-liste');
  btnN.style.cssText = `background:${p.accent}20;border-color:${p.accent};color:${p.accent};`;

  if(STATE.persos.length === 0) {
    container.innerHTML = `<p style="color:${p.sub};text-align:center;padding:2rem;">Aucun aventurier créé.</p>`;
    return;
  }
  container.innerHTML = STATE.persos.map((perso, i) => {
    const pp = pal(perso.univers);
    const univ = UNIVERS.find(u => u.id === perso.univers);
    const pvPct = Math.max(0, Math.min(100, (perso.pv / perso.pvMax) * 100));
    const pvColor = perso.pv > perso.pvMax * 0.5 ? '#4caf50' : perso.pv > perso.pvMax * 0.25 ? '#ff9800' : '#f44336';
    return `

const ETAPES_LABELS = ["Univers","Race","Classe","Nom","Stats","Compétences","Confirmer"];

function renderEtape() {
  const p = STATE.choixUnivers ? pal(STATE.choixUnivers) : PALETTES.default;
  applyTheme(p);

  // Progress
  const prog = document.getElementById('progress-steps');
  prog.innerHTML = ETAPES_LABELS.map((_,i) =>
    `<div class="progress-bar-track" style="background:${i <= STATE.etape ? p.accent : p.border+'50'};">
       <div class="progress-bar-fill" style="width:100%;background:${i <= STATE.etape ? p.accent : 'transparent'};"></div>
     </div>`
  ).join('');

  const c = document.getElementById('creation-content');
  const e = STATE.etape;

  if(e === 0) c.innerHTML = renderEtapeUnivers(p);
  else if(e === 1) c.innerHTML = renderEtapeRace(p);
  else if(e === 2) c.innerHTML = renderEtapeClasse(p);
  else if(e === 3) c.innerHTML = renderEtapeNom(p);
  else if(e === 4) { if(!STATE.choixStats) STATE.choixStats = rollStats(); c.innerHTML = renderEtapeStats(p); }
  else if(e === 5) c.innerHTML = renderEtapeComps(p);
  else if(e === 6) c.innerHTML = renderEtapeConfirm(p);
}

  document.querySelectorAll('#creation-content .btn').forEach(b => {

  if(STATE.etape === 3) { STATE.choixNom = document.getElementById('input-nom')?.value.trim() || STATE.choixNom; }

}
function etapePrecedente() {
  if(STATE.etape === 0) { showAccueil(); return; }
  STATE.etape--; renderEtape();
}

function rollStats() {
  return STATS_LABELS.reduce((acc, s) => {
    const rolls = [r6(),r6(),r6(),r6()].sort((a,b)=>b-a);
    acc[s] = rolls[0]+rolls[1]+rolls[2];
    return acc;
  }, {});
}
function r6() { return Math.floor(Math.random()*6)+1; }
function d20() { return Math.floor(Math.random()*20)+1; }

function creerPersonnage() {
  const s = STATE.choixStats;
  const pvMax = 10 + Math.floor((s.Constitution-10)/2)*2 + (['Guerrier','Paladin','Soldat','Pillard'].includes(STATE.choixClasse)?5:0);
  const perso = {
    nom: STATE.choixNom, race: STATE.choixRace, classe: STATE.choixClasse,
    univers: STATE.choixUnivers, niveau: 1, experience: 0,
    pv: pvMax, pvMax, or: 50,
    stats: s, competences: [...STATE.choixComps],
    inventaire: [], quetes: [],
    dateCreation: new Date().toISOString(),
  };
  savePerso(perso);
  STATE.persoActif = perso;
  STATE.apiMessages = [];
  ouvrirJeu();
}

   ['btn-parler',pp.border,pp.sub],['btn-quetes',pp.border,pp.sub]].forEach(([id,bc,tc]) => {

function updateHeaderPV() {
  const p = STATE.persoActif;
  const pp = pal(p.univers);
  const pct = Math.max(0, Math.min(100, p.pv/p.pvMax*100));
  const pvColor = p.pv > p.pvMax*0.5 ? '#4caf50' : p.pv > p.pvMax*0.25 ? '#ff9800' : '#f44336';
  document.getElementById('header-pv').innerHTML =
    `<span style="color:${pvColor};">❤️${p.pv}/${p.pvMax}</span>`;
}

function modifyPV(delta) {
  const p = STATE.persoActif;
  p.pv = Math.max(0, Math.min(p.pvMax, p.pv + delta));
  savePerso(p);
  updateHeaderPV();
  const pp = pal(p.univers);
  ajouterMessageSys(delta > 0 ? `💚 +${delta} PV → ${p.pv}/${p.pvMax} PV` : `💔 ${delta} PV → ${p.pv}/${p.pvMax} PV`);
  if(p.pv <= 0) ajouterMessageSys('💀 Vous êtes à terre ! Votre aventure se termine ici... ou presque.');
}

  document.getElementById('btn-envoyer').disabled = true;

  const newMsg = { role:'user', content: userContent };

  try {

      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':'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',
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:1000, system: buildSystem(), messages: msgs })
    });

    supprimerTyping();
    ajouterMsg('mj', reponse);
    analyserQuetes(reponse);
  } catch(err) {
    supprimerTyping();
    ajouterMsg('mj', '⚠️ Erreur : ' + err.message);
  }
  STATE.chargement = false;
  document.getElementById('btn-envoyer').disabled = false;
}

async function envoyerSaisie() {
  const texte = document.getElementById('saisie').value.trim();
  if(!texte || STATE.chargement) return;
  document.getElementById('saisie').value = '';
  ajouterMsg('joueur', texte);

  const motsCles = ['attaque','combat','esquive','tente','essaie','crochète','persuade','force','frappe','tire','court','saute','grimpe','nage'];
  const needsRoll = motsCles.some(m => texte.toLowerCase().includes(m));

  let contenu = texte;
  if(needsRoll) {
    const r = d20();
    const crit = r===20, echec = r===1;
    ajouterMessageSys(`🎲 Jet de dé : ${r}/20${crit?' — CRITIQUE ! 🌟':echec?' — ÉCHEC CRITIQUE ! 💀':r>=15?' — Succès !':r>=10?' — Succès partiel':' — Échec...'}`);
    contenu += `\n[Jet de dé du joueur : ${r}/20${crit?' CRITIQUE !':echec?' ÉCHEC CRITIQUE !':''}]`;
  }
  await callMJ(contenu);
}

function handleKey(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); envoyerSaisie(); }
}

// ── Analyse quêtes & progression ──
function analyserQuetes(texte) {
  const p = STATE.persoActif;
  const nouv = texte.match(/📜 NOUVELLE QUÊTE\s*:\s*([^\n]+)/i);
  const acc  = texte.match(/✅ QUÊTE ACCOMPLIE\s*:\s*([^\n]+)/i);

  if(nouv) {
    const titre = nouv[1].trim();
    if(!(p.quetes||[]).find(q=>q.titre===titre)) {
      p.quetes = [...(p.quetes||[]), { titre, description:'En cours...', terminee:false }];
      ajouterMessageSys(`📜 Nouvelle quête : ${titre}`);
    }
  }
  if(acc) {
    const titre = acc[1].trim();
    p.quetes = (p.quetes||[]).map(q =>
      q.titre.toLowerCase().includes(titre.toLowerCase().substring(0,10)) ? {...q, terminee:true} : q
    );
    p.experience = (p.experience||0) + 100;
    const nvNiveau = Math.floor(p.experience/300)+1;
    if(nvNiveau > p.niveau) {
      p.niveau = nvNiveau; p.pvMax += 5; p.pv = Math.min(p.pv+5, p.pvMax);
      ajouterMessageSys(`🎉 Niveau ${nvNiveau} ! +5 PV max. Vous êtes plus puissant !`);
      document.getElementById('header-sub').textContent = `${p.race} · ${p.classe} · Niv.${p.niveau}`;
    }
    ajouterMessageSys(`✅ Quête accomplie : ${acc[1].trim()} (+100 XP)`);
  }
  savePerso(p);
  updateHeaderPV();
}

// ── Modals ──
function openFiche() {
  const p = STATE.persoActif;

  const pvPct = Math.max(0, Math.min(100, p.pv/p.pvMax*100));
  const pvColor = p.pv > p.pvMax*0.5 ? '#4caf50' : p.pv > p.pvMax*0.25 ? '#ff9800' : '#f44336';

  document.getElementById('fiche-content').style.cssText = `background:${pp.card};border-color:${pp.border};`;
  document.getElementById('fiche-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2 style="color:${pp.accent};font-size:1.1rem;">📋 ${p.nom}</h2>
      <button onclick="closeFiche()" style="background:none;border:none;color:${pp.sub};cursor:pointer;font-size:1.3rem;padding:0.2rem;">✕</button>
    </div>
    <div style="color:${pp.sub};font-size:0.8rem;margin-bottom:0.8rem;">${p.race} · ${p.classe} · Niveau ${p.niveau} · ${univ?.label||''}</div>
    <div style="height:8px;border-radius:4px;background:${pp.border}40;overflow:hidden;margin-bottom:0.3rem;">
      <div style="height:100%;width:${pvPct}%;background:${pvColor};transition:width 0.3s;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;color:${pp.sub};font-size:0.78rem;margin-bottom:1rem;">
      <span>❤️ PV : ${p.pv}/${p.pvMax}</span><span>💰 Or : ${p.or}</span><span>⭐ Exp : ${p.experience}</span>
    </div>
    <h4 style="color:${pp.text};margin-bottom:0.5rem;font-size:0.88rem;">Statistiques</h4>
    <div class="grid-3" style="margin-bottom:1rem;">
      ${STATS_LABELS.map(s => {
        const mod = Math.floor((p.stats[s]-10)/2);
        return `<div class="stat-card" style="background:${pp.card};border-color:${pp.border}30;">
          <div style="color:${pp.sub};font-size:0.6rem;text-transform:uppercase;">${s.substring(0,3)}</div>
          <div style="color:${pp.accent};font-weight:bold;">${p.stats[s]}</div>
          <div style="color:${pp.text};font-size:0.72rem;">${mod>=0?'+'+mod:''+mod}</div>
        </div>`;
      }).join('')}
    </div>
    <h4 style="color:${pp.text};margin-bottom:0.5rem;font-size:0.88rem;">Compétences</h4>
    <div style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1rem;">
      ${p.competences.map(c=>`<span style="background:${pp.accent}18;border:1px solid ${pp.accent}50;color:${pp.accent};border-radius:4px;padding:0.2rem 0.5rem;font-size:0.75rem;">${c}</span>`).join('')}
    </div>
    ${(p.quetes||[]).length > 0 ? `
    <h4 style="color:${pp.text};margin-bottom:0.5rem;font-size:0.88rem;">Quêtes (${(p.quetes||[]).filter(q=>!q.terminee).length} active${(p.quetes||[]).filter(q=>!q.terminee).length>1?'s':''})</h4>
    ${(p.quetes||[]).map(q=>`<div style="background:${pp.border}20;border-radius:6px;padding:0.5rem 0.7rem;margin-bottom:0.4rem;display:flex;align-items:flex-start;gap:0.4rem;">
      <span>${q.terminee?'✅':'📜'}</span>
      <div style="color:${q.terminee?pp.sub:pp.text};font-size:0.82rem;text-decoration:${q.terminee?'line-through':'none'};flex:1;">${q.titre}</div>
    </div>`).join('')}` : ''}`;
  document.getElementById('modal-fiche').style.display = 'flex';
}

function closeFiche(e) {
  if(!e || e.target === document.getElementById('modal-fiche') || !e.target) {
    document.getElementById('modal-fiche').style.display = 'none';
  }
}

function openQuetes() {

  const actives = (p.quetes||[]).filter(q=>!q.terminee);
  const terminees = (p.quetes||[]).filter(q=>q.terminee);

  document.getElementById('quetes-content').style.cssText = `background:${pp.card};border-color:${pp.border};`;
  document.getElementById('quetes-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">

    </div>`).join('')}` : ''}

function closeQuetes(e) {

    document.getElementById('modal-quetes').style.display = 'none';
  }
}
