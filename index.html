<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Saga Solitaire"/>
<title>⚔️ Saga Solitaire</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Georgia,serif;background:#0a0a0f;color:#d0d0f0;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column}
.screen{flex:1;overflow-y:auto;padding:1.2rem;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
.btn{border-radius:8px;cursor:pointer;font-family:Georgia,serif;transition:all .15s;border:1px solid;display:inline-flex;align-items:center;justify-content:center;gap:.4rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;cursor:not-allowed}
input,textarea{font-family:Georgia,serif;outline:none;box-sizing:border-box}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px #7070ff60}50%{text-shadow:0 0 40px #7070ffaa}}
.fade-in{animation:fadeIn .3s ease forwards}
#chat{flex:1;overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.7rem}
.msg-mj{align-self:flex-start;max-width:88%;animation:fadeIn .3s ease}
.msg-joueur{align-self:flex-end;max-width:88%;animation:fadeIn .3s ease}
.msg-sys{align-self:center;max-width:92%;animation:fadeIn .2s ease}
.bubble{padding:.7rem .9rem;border-radius:12px;border:1px solid;line-height:1.65;font-size:.92rem;white-space:pre-wrap;word-break:break-word}
#input-zone{flex-shrink:0;padding:.6rem;border-top:1px solid #3a3a5c;background:#14141e}
#input-zone .actions{display:flex;gap:.4rem;margin-bottom:.5rem;flex-wrap:wrap}
#input-zone .row{display:flex;gap:.4rem}
#saisie{flex:1;border-radius:8px;padding:.6rem .8rem;font-size:.92rem;border:1px solid #3a3a5c;background:#0a0a0f;color:#d0d0f0;resize:none;height:42px;line-height:1.4}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{border-radius:16px;border:1px solid;padding:1.2rem;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.dot{width:7px;height:7px;border-radius:50%;animation:pulse 1s infinite;display:inline-block}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#3a3a5c;border-radius:2px}
</style>
</head>
<body>
<div id="app">

<!-- ECRAN CLE -->
<div id="s-cle" class="screen active" style="text-align:center">
  <div style="max-width:320px;width:100%">
    <div style="font-size:3.5rem;margin-bottom:1rem">🔑</div>
    <h2 style="color:#7070ff;margin-bottom:.8rem">Clé API Anthropic</h2>
    <p style="color:#7070a0;font-size:.85rem;margin-bottom:1.5rem;line-height:1.6">
      Nécessaire pour que le MJ IA fonctionne.<br>
      Stockée <strong style="color:#d0d0f0">uniquement sur ton appareil</strong>.
    </p>
    <input id="i-cle" type="password" placeholder="sk-ant-api03-..."
      style="width:100%;background:#14141e;border:2px solid #3a3a5c;color:#d0d0f0;border-radius:8px;padding:.8rem;font-size:.9rem;margin-bottom:.8rem"
      onfocus="this.style.borderColor='#7070ff'" onblur="this.style.borderColor='#3a3a5c'"/>
    <button class="btn" onclick="saveCle()" style="width:100%;padding:.8rem;font-size:1rem;background:#7070ff25;border-color:#7070ff;color:#7070ff;margin-bottom:1rem">
      ✅ Enregistrer et jouer
    </button>
    <div id="cle-err" style="color:#f44336;font-size:.8rem;display:none;margin-bottom:.8rem">
      Clé invalide. Elle doit commencer par sk-ant-
    </div>
    <p style="color:#7070a0;font-size:.75rem;line-height:1.8">
      Crée ta clé gratuitement sur<br>
      <strong style="color:#d0d0f0">console.anthropic.com</strong><br>
      → API Keys → Create Key
    </p>
  </div>
</div>

<!-- ECRAN ACCUEIL -->
<div id="s-accueil" class="screen" style="text-align:center">
  <div style="margin-bottom:2.5rem">
    <div style="font-size:4rem;margin-bottom:.5rem">⚔️</div>
    <h1 style="font-size:2.4rem;letter-spacing:.06em;animation:glow 3s infinite;color:#7070ff">SAGA SOLITAIRE</h1>
    <p style="margin-top:.4rem;font-size:.95rem;letter-spacing:.1em;opacity:.7">JEU DE RÔLE SOLO · MAÎTRE IA</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:1rem;width:100%;max-width:300px">
    <button class="btn" onclick="goCreation()" style="font-size:1rem;padding:.85rem;background:#7070ff25;border-color:#7070ff;color:#7070ff">✨ Nouveau Personnage</button>
    <button class="btn" id="btn-continuer" onclick="goListe()" style="font-size:1rem;padding:.85rem;background:#3a3a5c25;border-color:#3a3a5c;color:#7070a0;display:none">📜 Continuer</button>
  </div>
  <button class="btn" onclick="changeCle()" style="margin-top:2rem;font-size:.72rem;padding:.3rem .7rem;background:transparent;border-color:#3a3a5c;color:#7070a0;opacity:.5">🔑 Changer la clé API</button>
</div>

<!-- ECRAN LISTE -->
<div id="s-liste" class="screen" style="align-items:stretch;justify-content:flex-start;padding-top:1rem">
  <button class="btn" onclick="goAccueil()" style="align-self:flex-start;margin-bottom:1rem;padding:.3rem .7rem;font-size:.85rem;background:transparent;border-color:#3a3a5c;color:#7070a0">← Retour</button>
  <h2 style="color:#7070ff;margin-bottom:1rem">Mes Aventuriers</h2>
  <div id="liste-persos" style="display:flex;flex-direction:column;gap:.8rem"></div>
  <button class="btn" onclick="goCreation()" style="margin-top:1.2rem;padding:.7rem;font-size:.95rem;width:100%;background:#7070ff25;border-color:#7070ff;color:#7070ff">✨ Nouveau Personnage</button>
</div>

<!-- ECRAN CREATION -->
<div id="s-creation" class="screen" style="align-items:stretch;justify-content:flex-start;max-width:600px;margin:0 auto;width:100%">
  <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:1.5rem;flex-shrink:0">
    <button class="btn" onclick="etapePrev()" style="font-size:.8rem;padding:.3rem .5rem;flex-shrink:0;background:transparent;border-color:#3a3a5c;color:#7070a0">←</button>
    <div id="prog" style="display:flex;gap:4px;flex:1"></div>
  </div>
  <div id="creation-c" style="flex:1;overflow-y:auto"></div>
</div>

<!-- ECRAN JEU -->
<div id="s-jeu" style="display:none;flex-direction:column;height:100vh;height:100dvh">
  <div id="g-header" style="display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-bottom:1px solid #3a3a5c;background:#14141e;flex-shrink:0">
    <button class="btn" onclick="goListe()" style="font-size:1rem;padding:.3rem .5rem;background:transparent;border-color:#3a3a5c;color:#7070a0">←</button>
    <div style="flex:1;min-width:0">
      <div id="g-nom" style="font-weight:bold;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#7070ff"></div>
      <div id="g-sub" style="font-size:.72rem;opacity:.6"></div>
    </div>
    <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:.2rem;border:1px solid #3a3a5c;border-radius:6px;padding:.2rem .4rem">
        <button onclick="modPV(-1)" style="background:none;border:none;color:#f44336;cursor:pointer;font-size:.95rem;padding:0 2px;touch-action:manipulation">−</button>
        <span id="g-pv" style="font-size:.78rem;min-width:50px;text-align:center"></span>
        <button onclick="modPV(1)" style="background:none;border:none;color:#4caf50;cursor:pointer;font-size:.95rem;padding:0 2px;touch-action:manipulation">+</button>
      </div>
      <button class="btn" onclick="openFiche()" style="font-size:.72rem;padding:.25rem .5rem;background:transparent;border-color:#3a3a5c;color:#7070a0">📋</button>
    </div>
  </div>
  <div id="chat"></div>
  <div id="input-zone">
    <div class="actions">
      <button class="btn" onclick="rollD20()" style="font-size:.75rem;padding:.25rem .5rem;background:#3a3a5c25;border-color:#3a3a5c;color:#7070a0">🎲 d20</button>
      <button class="btn" onclick="doCombat()" style="font-size:.75rem;padding:.25rem .5rem;background:#8b000025;border-color:#8b0000;color:#ff6060">⚔️ Combat</button>
      <button class="btn" onclick="doAction('repos')" style="font-size:.75rem;padding:.25rem .5rem;background:#3a3a5c25;border-color:#3a3a5c;color:#7070a0">💤 Repos</button>
      <button class="btn" onclick="doAction('explorer')" style="font-size:.75rem;padding:.25rem .5rem;background:#3a3a5c25;border-color:#3a3a5c;color:#7070a0">🔍 Explorer</button>
      <button class="btn" onclick="doAction('parler')" style="font-size:.75rem;padding:.25rem .5rem;background:#3a3a5c25;border-color:#3a3a5c;color:#7070a0">💬 Parler</button>
      <button class="btn" onclick="openQuetes()" style="font-size:.75rem;padding:.25rem .5rem;background:#3a3a5c25;border-color:#3a3a5c;color:#7070a0">📜 Quêtes</button>
    </div>
    <div class="row">
      <textarea id="saisie" placeholder="Décrivez votre action..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="btn" id="btn-send" onclick="send()" style="font-size:1.1rem;padding:.4rem .7rem;flex-shrink:0;background:#7070ff25;border-color:#7070ff;color:#7070ff">➤</button>
    </div>
  </div>
</div>

</div><!-- /app -->

<!-- MODAL FICHE -->
<div id="m-fiche" class="modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div id="m-fiche-c" class="modal-box" style="background:#14141e;border-color:#3a3a5c"></div>
</div>
<!-- MODAL QUETES -->
<div id="m-quetes" class="modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div id="m-quetes-c" class="modal-box" style="background:#14141e;border-color:#3a3a5c"></div>
</div>

<script>
// ── DONNÉES ──────────────────────────────────
const UNIVERS=[
  {id:"medieval",emoji:"⚔️",label:"Médiéval Fantastique",desc:"Magie, dragons, royaumes en guerre et donjons oubliés.",
   pal:{bg:"#0d0a07",card:"#1a1208",border:"#7c5c1e",accent:"#d4a017",text:"#e8d5a3",sub:"#a08050"}},
  {id:"futuriste",emoji:"🚀",label:"Futuriste / Cyberpunk",desc:"Corporations, IA rebelles, implants cybernétiques.",
   pal:{bg:"#060d14",card:"#0d1a24",border:"#0050aa",accent:"#00d4ff",text:"#c0e8ff",sub:"#6090a0"}},
  {id:"horreur",emoji:"🕯️",label:"Horreur Gothique",desc:"Créatures de la nuit, asiles maudits, rituels occultes.",
   pal:{bg:"#080506",card:"#110a0e",border:"#6b1020",accent:"#cc2040",text:"#d8b0b8",sub:"#805060"}},
  {id:"western",emoji:"🤠",label:"Western Fantastique",desc:"Grand Ouest mystérieux, esprits, mort-vivants.",
   pal:{bg:"#0e0a06",card:"#1a1208",border:"#8b5e1a",accent:"#e8a040",text:"#e8d0a0",sub:"#a07040"}},
  {id:"postapoc",emoji:"☢️",label:"Post-Apocalyptique",desc:"Wasteland, survivants, mutants et factions en guerre.",
   pal:{bg:"#080a06",card:"#101408",border:"#607020",accent:"#a0cc20",text:"#c8d890",sub:"#708040"}},
  {id:"pirate",emoji:"🏴‍☠️",label:"Pirates & Mers Mystiques",desc:"Océans enchantés, kraken, îles maudites.",
   pal:{bg:"#060c10",card:"#0c1820",border:"#1a6080",accent:"#20a0c0",text:"#a0d8e8",sub:"#507080"}},
];
const RACES={
  medieval:["Humain","Elfe","Nain","Semi-Orc","Halfelin","Gnome","Tieffelin","Drakéide"],
  futuriste:["Humain","Humain Augmenté","Androïde","Alien Xérien","Clone","IA Incarnée","Mutant","Humain Spatial"],
  horreur:["Humain","Demi-Vampire","Loup-Garou Latent","Médium","Descendant de Sorcière","Revenant","Nephilim","Humain Maudit"],
  western:["Humain","Revenant","Esprit Incarné","Natif Mystique","Demi-Démon","Chasseur Maudit","Automate","Pistolero Fantôme"],
  postapoc:["Humain","Mutant","Synthétique","Enfant des Cendres","Cyborg","Ghoul Conscient","Nomade Irradié","Super-Mutant"],
  pirate:["Humain","Elfe des Mers","Sirène Métamorphe","Mort-Vivant Marin","Nain des Profondeurs","Homme-Crabe","Esprit des Tempêtes","Tieffelin Marin"],
};
const CLASSES={
  medieval:["Guerrier","Mage","Voleur","Clerc","Rôdeur","Paladin","Druide","Barde"],
  futuriste:["Soldat","Hacker","Ingénieur","Médic","Espion","Pilote","Mercenaire","Psionique"],
  horreur:["Chasseur","Occultiste","Médecin","Détective","Exorciste","Nécromancien","Gardien","Fantôme Joueur"],
  western:["Pistolero","Shaman","Chasseur de Primes","Marchand","Docteur","Hors-la-loi","Éclaireur","Prédicateur"],
  postapoc:["Pillard","Technicien","Éclaireur","Médic de Fortune","Chef de Clan","Guerrier Mutant","Bricoleur","Sniper"],
  pirate:["Corsaire","Capitaine","Canonnier","Navigateur","Mage des Mers","Cuisinier Mystique","Lame Dansante","Vaudouisant"],
};
const COMPS={
  medieval:["Épée à deux mains","Archerie","Magie du feu","Soins","Discrétion","Persuasion","Survie","Crochetage","Connaissance des créatures","Alchimie"],
  futuriste:["Combat rapproché","Piratage","Réparation","Médecine","Tir de précision","Pilotage","Cryptographie","Ingénierie","Manipulation","Survie"],
  horreur:["Tir","Combat à mains nues","Rituel occulte","Médecine","Discrétion","Enquête","Résistance mentale","Exorcisme","Perception","Premiers secours"],
  western:["Dégainement rapide","Équitation","Survie désertique","Poker","Intimidation","Premiers secours","Pistage","Explosifs","Lasso","Connaissance des esprits"],
  postapoc:["Combat brutal","Récupération","Mécanique","Médecine de terrain","Survie","Négociation","Tir","Piégeage","Radiation","Leadership"],
  pirate:["Escrime","Navigation","Canonnade","Nœuds marins","Plongée","Commerce","Intimidation","Mers mystiques","Combat naval","Vaudou"],
};
const STATS=["Force","Dextérité","Constitution","Intelligence","Sagesse","Charisme"];

// ── STATE ─────────────────────────────────────
let S={
  persos:[],persoActif:null,apiMsgs:[],loading:false,
  etape:0,univers:null,race:null,classe:null,nom:"",stats:null,comps:[],
};
function pal(id){return UNIVERS.find(u=>u.id===id)?.pal||{bg:"#0a0a0f",card:"#14141e",border:"#3a3a5c",accent:"#7070ff",text:"#d0d0f0",sub:"#7070a0"}}
function loadP(){try{S.persos=JSON.parse(localStorage.getItem('saga_p')||'[]')}catch{S.persos=[]}}
function saveP(){localStorage.setItem('saga_p',JSON.stringify(S.persos))}
function savePerso(p){const i=S.persos.findIndex(x=>x.dc===p.dc);if(i>=0)S.persos[i]=p;else S.persos.push(p);S.persoActif=p;saveP()}
function r6(){return Math.floor(Math.random()*6)+1}
function d20(){return Math.floor(Math.random()*20)+1}
function rollStats(){return STATS.reduce((a,s)=>{const r=[r6(),r6(),r6(),r6()].sort((a,b)=>b-a);a[s]=r[0]+r[1]+r[2];return a},{})}
function mod(v){const m=Math.floor((v-10)/2);return m>=0?'+'+m:''+m}

// ── CLÉ API ───────────────────────────────────
function saveCle(){
  const k=document.getElementById('i-cle').value.trim();
  document.getElementById('cle-err').style.display='none';
  if(!k||!k.startsWith('sk-ant-')){document.getElementById('cle-err').style.display='block';return}
  localStorage.setItem('saga_key',k);
  goAccueil();
}
function changeCle(){show('s-cle');const k=localStorage.getItem('saga_key')||'';if(k)document.getElementById('i-cle').value=k}

// ── NAVIGATION ────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display=''});
  document.getElementById('s-jeu').style.display='none';
  const el=document.getElementById(id);
  if(el){el.classList.add('active');el.style.display='flex'}
}
function goAccueil(){
  loadP();
  const p={bg:"#0a0a0f",card:"#14141e",border:"#3a3a5c",accent:"#7070ff",text:"#d0d0f0",sub:"#7070a0"};
  applyTheme(p);
  const bc=document.getElementById('btn-continuer');
  bc.style.display=S.persos.length>0?'flex':'none';
  bc.textContent='📜 Continuer ('+S.persos.length+' perso'+(S.persos.length>1?'s':'')+')';
  show('s-accueil');
}
function goListe(){loadP();applyTheme(pal(null));renderListe();show('s-liste')}
function goCreation(){S.etape=0;S.univers=S.race=S.classe=null;S.nom='';S.stats=null;S.comps=[];applyTheme(pal(null));renderEtape();show('s-creation')}
function applyTheme(p){
  document.body.style.background=p.bg;
  document.body.style.color=p.text;
}

// ── LISTE ─────────────────────────────────────
function renderListe(){
  const c=document.getElementById('liste-persos');
  if(!S.persos.length){c.innerHTML='<p style="color:#7070a0;text-align:center;padding:2rem">Aucun aventurier créé.</p>';return}
  c.innerHTML=S.persos.map((p,i)=>{
    const pp=pal(p.univers),u=UNIVERS.find(x=>x.id===p.univers);
    const pct=Math.max(0,Math.min(100,p.pv/p.pvMax*100));
    const pc=p.pv>p.pvMax*.5?'#4caf50':p.pv>p.pvMax*.25?'#ff9800':'#f44336';
    return `<div onclick="jouer(${i})" style="background:${pp.card};border:1px solid ${pp.border};border-radius:10px;padding:1rem;cursor:pointer;display:flex;align-items:center;gap:.8rem;transition:transform .15s" onmouseenter="this.style.transform='translateX(5px)'" onmouseleave="this.style.transform='translateX(0)'">
      <div style="font-size:2rem">${u?.emoji||'🎭'}</div>
      <div style="flex:1;min-width:0">
        <div style="color:${pp.accent};font-weight:bold">${p.nom}</div>
        <div style="color:${pp.sub};font-size:.78rem">${p.race} · ${p.classe} · Niv.${p.niveau}</div>
        <div style="margin-top:.3rem;height:4px;border-radius:2px;background:${pp.border}40;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pc}"></div></div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="color:${pc};font-size:.8rem">❤️${p.pv}/${p.pvMax}</div>
        <div style="color:${pp.sub};font-size:.72rem">${(p.quetes||[]).filter(q=>!q.ok).length} quête(s)</div>
      </div>
    </div>`;
  }).join('');
}
function jouer(i){S.persoActif=JSON.parse(JSON.stringify(S.persos[i]));S.apiMsgs=[];ouvrirJeu()}

// ── CRÉATION ─────────────────────────────────
const ETAPES=["Univers","Race","Classe","Nom","Stats","Compétences","Confirmer"];
function renderEtape(){
  const p=S.univers?pal(S.univers):pal(null);
  applyTheme(p);
  document.getElementById('prog').innerHTML=ETAPES.map((_,i)=>
    `<div style="flex:1;height:4px;border-radius:2px;background:${i<=S.etape?p.accent:p.border+'50'}"></div>`
  ).join('');
  const c=document.getElementById('creation-c');
  if(S.etape===0) c.innerHTML=renderUnivers(p);
  else if(S.etape===1) c.innerHTML=renderRace(p);
  else if(S.etape===2) c.innerHTML=renderClasse(p);
  else if(S.etape===3) c.innerHTML=renderNom(p);
  else if(S.etape===4){if(!S.stats)S.stats=rollStats();c.innerHTML=renderStats(p)}
  else if(S.etape===5) c.innerHTML=renderComps(p);
  else if(S.etape===6) c.innerHTML=renderConfirm(p);
}
function renderUnivers(p){
  return `<h2 style="color:${p.accent};margin-bottom:.4rem">Choisissez votre univers</h2>
  <p style="color:${p.sub};margin-bottom:1.2rem;font-size:.85rem">Chaque univers offre des races, classes et aventures uniques.</p>
  <div class="grid2">${UNIVERS.map(u=>`<div onclick="pickUnivers('${u.id}')" style="background:${u.pal.card};border:2px solid ${u.pal.border};border-radius:10px;padding:.8rem;cursor:pointer">
    <div style="font-size:1.6rem;margin-bottom:.3rem">${u.emoji}</div>
    <div style="color:${u.pal.accent};font-weight:bold;font-size:.85rem">${u.label}</div>
    <div style="color:${u.pal.sub};font-size:.72rem;margin-top:.2rem">${u.desc}</div>
  </div>`).join('')}</div>`;
}
function pickUnivers(id){S.univers=id;S.race=S.classe=null;S.etape=1;renderEtape()}
function renderRace(p){
  return `<h2 style="color:${p.accent};margin-bottom:1rem">Choisissez votre race</h2>
  <div style="display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem">

// ── API ──────────────────────────────────────
async function callMJ(txt){
  if(S.loading)return;S.loading=true;
  document.getElementById('btn-send').disabled=true;
  showTyping();
  const newMsg={role:'user',content:txt};
  const msgs=[...S.apiMsgs,newMsg];
  const key=localStorage.getItem('saga_key')||'';
  if(!key){hideTyping();addMsg('mj','🔑 Aucune clé API. Retourne à l\'accueil pour configurer ta clé.');S.loading=false;document.getElementById('btn-send').disabled=false;return}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:buildSys(),messages:msgs})
    });
    const data=await res.json();
    const rep=data.content?.map(b=>b.text||'').join('')||data.error?.message||'Le MJ est silencieux...';
    S.apiMsgs=[...msgs,{role:'assistant',content:rep}];
    hideTyping();addMsg('mj',rep);parseQuetes(rep);
  }catch(e){hideTyping();addMsg('mj','⚠️ Erreur : '+e.message)}
  S.loading=false;document.getElementById('btn-send').disabled=false;
}

async function send(){
  const txt=document.getElementById('saisie').value.trim();
  if(!txt||S.loading)return;
  document.getElementById('saisie').value='';
  addMsg('joueur',txt);
  const mots=['attaque','combat','esquive','tente','essaie','frappe','tire','court','saute','grimpe','force','persuade','crochète'];
  let contenu=txt;
  if(mots.some(m=>txt.toLowerCase().includes(m))){

    contenu+=`\n[Jet de dé : ${r}/20${crit?' CRITIQUE':echec?' ÉCHEC CRITIQUE':''}]`;

}

function parseQuetes(txt){
  const p=S.persoActif;
  const nq=txt.match(/📜 NOUVELLE QUÊTE\s*:\s*([^\n]+)/i);
  const aq=txt.match(/✅ QUÊTE ACCOMPLIE\s*:\s*([^\n]+)/i);
  if(nq){const t=nq[1].trim();if(!(p.quetes||[]).find(q=>q.titre===t)){p.quetes=[...(p.quetes||[]),{titre:t,ok:false}];addMsg('sys','📜 Nouvelle quête : '+t)}}
  if(aq){
    const t=aq[1].trim();
    p.quetes=(p.quetes||[]).map(q=>q.titre.toLowerCase().includes(t.toLowerCase().substring(0,10))?{...q,ok:true}:q);
    p.experience=(p.experience||0)+100;
    const nv=Math.floor(p.experience/300)+1;
    if(nv>p.niveau){p.niveau=nv;p.pvMax+=5;p.pv=Math.min(p.pv+5,p.pvMax);addMsg('sys',`🎉 Niveau ${nv} ! +5 PV max !`);document.getElementById('g-sub').textContent=`${p.race} · ${p.classe} · Niv.${p.niveau}`}
    addMsg('sys','✅ Quête accomplie : '+t+' (+100 XP)');
  }
  savePerso(p);updatePV();
}
